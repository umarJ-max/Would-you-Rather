<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Would You Rather — endless AI-powered dilemmas. Pick your side." />
  <title>Would You Rather?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='85'>🤔</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-logo">Would You Rather?</div>
    <div class="nav-meta">
      <span class="nav-count" id="navCount">Q 1</span>
      <span class="nav-streak hidden" id="navStreak">🔥 0</span>
      <button class="btn-nav-reset" id="resetBtn" title="Reset">↺</button>
    </div>
  </nav>

  <!-- Main question area -->
  <main class="main" id="mainArea">

    <div class="question-wrap" id="questionWrap">
      <div class="question-label">Would you rather…</div>
      <h1 class="question-text" id="questionText">Loading your first dilemma…</h1>
    </div>

    <!-- Split choice panels -->
    <div class="choices" id="choicesArea">
      <button class="choice-panel choice-a" id="choiceA" onclick="pick('a')">
        <div class="choice-letter">A</div>
        <div class="choice-body" id="textA">—</div>
        <div class="choice-arrow">→</div>
      </button>

      <div class="choices-or">OR</div>

      <button class="choice-panel choice-b" id="choiceB" onclick="pick('b')">
        <div class="choice-letter">B</div>
        <div class="choice-body" id="textB">—</div>
        <div class="choice-arrow">←</div>
      </button>
    </div>

    <!-- After picking -->
    <div class="picked-state hidden" id="pickedState">
      <div class="picked-verdict" id="pickedVerdict"></div>
      <button class="btn-next" id="nextBtn" onclick="nextQuestion()">
        Next question
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </div>

    <!-- Loading state -->
    <div class="ai-loading hidden" id="aiLoading">
      <div class="ai-dots"><span></span><span></span><span></span></div>
      <p>AI is thinking up a new one…</p>
    </div>

  </main>

  <!-- Progress bar at bottom -->
  <div class="bottom-bar">
    <div class="bottom-bar-fill" id="progressFill"></div>
  </div>

  <footer class="footer">
    Made with <span class="heart">♥</span> by <a href="https://github.com/umarJ-max" target="_blank">Umar J</a>
    &nbsp;·&nbsp; Press A or B to pick
  </footer>

  <script src="script.js"></script>
</body>
</html>
